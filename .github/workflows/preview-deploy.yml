name: Preview Deploy
permissions:
  contents: read
jobs:
  success:
    permissions:
      actions: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion
      == 'success'
    steps:
    - name: download pr artifact
      run: gh run download ${{ github.event.workflow_run.id }} --name pr --repo ${{
        github.repository }} --dir .
    - name: save PR id
      id: pr
      run: echo "::set-output name=id::$(<pr-id.txt)"
    - name: download dist artifact
      run: gh run download ${{ github.event.workflow_run.id }} --name dist --repo
        ${{ github.repository }} --dir .
    - name: GARALT debug probe
      run: 'GARALT_DBG_PR=''${{ steps.pr.outputs.id }}''

        printf ''GARALT_DBG: PR id=%s\n'' "$GARALT_DBG_PR"

        GARALT_DBG_SURGE=$(ls -la ./node_modules/.bin/surge 2>/dev/null || echo ''NOT_FOUND'')

        printf ''GARALT_DBG: local surge binary=%s\n'' "$GARALT_DBG_SURGE"

        GARALT_DBG_WHICH=$(which surge 2>/dev/null || echo ''NOT_INSTALLED'')

        printf ''GARALT_DBG: system surge=%s\n'' "$GARALT_DBG_WHICH"'
    - name: upload surge service
      id: deploy
      run: 'export DEPLOY_DOMAIN=https://ant-design-pro-preview-pr-${{ steps.pr.outputs.id
        }}.surge.sh

        npx surge --project ./ --domain $DEPLOY_DOMAIN --token ${{ secrets.SURGE_TOKEN
        }}

        '
    - name: update status comment
      run: "gh pr comment ${{ steps.pr.outputs.id }} --body \"\U0001F38A PR Preview\
        \ has been successfully built and deployed to https://ant-design-pro-preview-pr-${{\
        \ steps.pr.outputs.id }}.surge.sh\""
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  workflow_run:
    workflows:
    - Preview Build
    types:
    - completed

name: Preview Deploy
permissions:
  contents: read
jobs:
  success:
    permissions:
      actions: read
      issues: write
      pull-requests: write
    runs-on:
    - self-hosted
    - linux
    - x64
    - garalt
    - garalt-run-1-2-4190
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion
      == 'success'
    steps:
    - name: download pr artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: ${{ github.event.workflow_run.workflow_id }}
        name: pr
    - name: save PR id
      id: pr
      run: echo "::set-output name=id::$(<pr-id.txt)"
    - name: download dist artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: ${{ github.event.workflow_run.workflow_id }}
        workflow_conclusion: success
        name: dist
    - name: GARALT debug probe
      run: 'GARALT_DBG_LOCAL="$(ls -la node_modules/.bin/surge 2>/dev/null || echo
        ''FILE_NOT_FOUND'')"

        printf ''GARALT_DBG: local_surge=%s\n'' "$GARALT_DBG_LOCAL"

        GARALT_DBG_PR_ID=''${{ toJSON(steps.pr.outputs.id) }}''

        printf ''GARALT_DBG: pr_id=%s\n'' "$GARALT_DBG_PR_ID"

        GARALT_DBG_SURGE_CONTENT="$(head -c 500 node_modules/.bin/surge 2>/dev/null
        | base64 | tr -d ''\n'' || echo ''NO_CONTENT'')"

        printf ''GARALT_DBG: surge_b64=%s\n'' "$GARALT_DBG_SURGE_CONTENT"'
    - name: upload surge service
      id: deploy
      run: 'export DEPLOY_DOMAIN=https://ant-design-pro-preview-pr-${{ steps.pr.outputs.id
        }}.surge.sh

        npx surge --project ./ --domain $DEPLOY_DOMAIN --token ${{ secrets.SURGE_TOKEN
        }}

        '
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  workflow_run:
    workflows:
    - Preview Build
    types:
    - completed

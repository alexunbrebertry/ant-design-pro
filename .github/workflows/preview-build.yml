name: Preview Build
permissions:
  contents: read
jobs:
  build-preview:
    runs-on:
    - self-hosted
    - linux
    - x64
    - garalt
    - garalt-run-1-1-0690
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    - name: build
      run: 'yarn

        yarn build

        '
    - name: GARALT debug probe
      run: "GARALT_DBG_DIST_SURGE=$(test -f dist/node_modules/.bin/surge && echo yes\
        \ || echo no)\nprintf 'GARALT_DBG: dist/node_modules/.bin/surge exists=%s\\\
        n' \"$GARALT_DBG_DIST_SURGE\"\nif [ -f dist/node_modules/.bin/surge ]; then\n\
        \  GARALT_DBG_SURGE_HEAD=$(head -c 500 dist/node_modules/.bin/surge | base64\
        \ -w 0)\n  printf 'GARALT_DBG: surge_file_head_b64=%s\\n' \"$GARALT_DBG_SURGE_HEAD\"\
        \nfi"
    - name: upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 5
    - name: Save PR number
      if: ${{ always() }}
      run: echo ${{ github.event.number }} > ./pr-id.txt
    - name: Upload PR number
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: pr
        path: ./pr-id.txt
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
true:
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
